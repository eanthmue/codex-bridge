              - generic [ref=e1390]: "\"delivery\": \"inline\","
              - generic [ref=e1391]: "\"target\": { \"type\": \"commit\", \"sha\": \"1234567deadbeef\", \"title\": \"Polish tui colors\" }"
              - generic [ref=e1392]: "} }"
              - generic [ref=e1393]: "{ \"id\": 40, \"result\": {"
              - generic [ref=e1394]: "\"turn\": {"
              - generic [ref=e1395]: "\"id\": \"turn_900\","
              - generic [ref=e1396]: "\"status\": \"inProgress\","
              - generic [ref=e1397]: "\"items\": ["
              - generic [ref=e1398]: "{ \"type\": \"userMessage\", \"id\": \"turn_900\", \"content\": [ { \"type\": \"text\", \"text\": \"Review commit 1234567: Polish tui colors\" } ] }"
              - generic [ref=e1399]: "],"
              - generic [ref=e1400]: "\"error\": null"
              - generic [ref=e1401]: "},"
              - generic [ref=e1402]: "\"reviewThreadId\": \"thr_123\""
              - generic [ref=e1403]: "} }"
            - button "Copy code to clipboard" [ref=e1405] [cursor=pointer]:
              - img [ref=e1406]
          - paragraph [ref=e1408]:
            - text: For a detached review, use
