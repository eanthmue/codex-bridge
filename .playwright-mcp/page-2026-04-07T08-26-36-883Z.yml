            - code [ref=e1411]: threadId
            - text: ). The server also emits a
            - code [ref=e1412]: thread/started
            - text: notification for that new thread before streaming the review turn.
          - paragraph [ref=e1413]:
            - text: Codex streams the usual
            - code [ref=e1414]: turn/started
            - text: notification followed by an
            - code [ref=e1415]: item/started
            - text: with an
            - code [ref=e1416]: enteredReviewMode
