              - text: ", experimental): one JSON-RPC message per WebSocket text frame."
          - paragraph [ref=e297]:
            - text: In WebSocket mode, app-server uses bounded queues. When request ingress is full, the server rejects new requests with JSON-RPC error code
            - code [ref=e298]: "-32001"
